name: Daily Snapshot from Realtime

permissions:
  contents: write

on:
  schedule:
    - cron: "37 23 * * *" # 北京时间 07:37
  workflow_dispatch:

jobs:
  snapshot-daily:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Freeze realtime latest into daily snapshot
        run: |
          set -euo pipefail

          if [ ! -f data/latest.csv ]; then
            echo "data/latest.csv not found; skip snapshot."
            exit 0
          fi

          TODAY=$(TZ=Asia/Shanghai date +%F)
          mkdir -p data_daily
          cp data/latest.csv "data_daily/${TODAY}.csv"

          python - <<'PY'
          import json
          import pathlib
          import re

          root = pathlib.Path('data_daily')
          pattern = re.compile(r'^\d{4}-\d{2}-\d{2}\.csv$')

          files = sorted([p.name for p in root.glob('*.csv') if pattern.match(p.name)])
          latest = files[-1] if files else ""

          manifest = {
              "latest": latest,
              "files": files,
          }

          manifest_path = root / 'manifest.json'
          current = None
          if manifest_path.exists():
              try:
                  current = json.loads(manifest_path.read_text(encoding='utf-8'))
              except Exception:
                  current = None

          if current != manifest:
              manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding='utf-8')
          PY

      - name: Commit and push changes
        run: |
          set -euo pipefail

          TODAY=$(TZ=Asia/Shanghai date +%F)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "data_daily/${TODAY}.csv" data_daily/manifest.json || true

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Daily snapshot ${TODAY}"
          git pull --rebase
          git push
