name: Realtime MoonBit Statistics

permissions:
  contents: write

on:
  schedule:
    - cron: "31 */2 * * *"
  workflow_dispatch:

jobs:
  fetch-realtime:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests

      - name: Run realtime fetch
        run: python fetch.py

      - name: Commit and push realtime data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_realtime
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE_BJ=$(date +%F)
          git commit -m "Realtime MoonBit Statistics for ${DATE_BJ}"
          git push
