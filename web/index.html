<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mooncakes Daily Data Viewer</title>
    <link rel="stylesheet" href="./style.css" />

    <link rel="icon" href="./dailydata.svg" type="image/svg+xml" />
  </head>
  <body>
    <main class="container">
      <h1>Mooncakes Daily Data</h1>

      <nav class="view-switch" aria-label="Data view switcher">
        <a class="view-switch-link active" href="./">Realtime</a>
        <a class="view-switch-link" href="./daily/">Daily Snapshot</a>
      </nav>

      <section class="card">
        <div class="controls-grid">
          <label>
            Metric
            <select id="metricSelect">
              <option value="line_count">line_count</option>
              <option value="package_count">package_count</option>
              <option value="module_count">module_count</option>
            </select>
          </label>

          <label>
            Date A (base)
            <input id="dateASelect" type="date" list="availableDates" />
          </label>

          <label>
            Date B (compare)
            <input id="dateBSelect" type="date" list="availableDates" />
          </label>

          <label>
            Quick range
            <div class="quick-range-group" aria-label="Quick date range shortcuts">
              <button type="button" class="quick-range-btn" data-quick-range="7">最近 7 天</button>
              <button type="button" class="quick-range-btn" data-quick-range="14">最近 14 天</button>
              <button type="button" class="quick-range-btn" data-quick-range="30">最近 30 天</button>
            </div>
          </label>

          <label>
            Aggregate by
            <select id="aggregateSelect">
              <option value="package">package</option>
              <option value="contributor">contributor</option>
            </select>
          </label>

          <label class="checkbox-label">
            <span>Trend range</span>
            <span class="checkbox-control">
              <input id="emphasizeTrend" type="checkbox" checked />
              <span>Emphasize trend</span>
            </span>
          </label>
        </div>

        <p id="deltaHint" class="delta-hint">Δ line_count (DateB − DateA) = 0</p>
        <p id="summary" class="summary">line_count | DateB − DateA = 0</p>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card trend-card">
        <h2>Trend</h2>
        <div class="chart-toolbar" aria-label="Trend range shortcuts">
          <button type="button" data-range="7">7D</button>
          <button type="button" data-range="30" class="active">30D</button>
          <button type="button" data-range="90">90D</button>
          <button type="button" data-range="all">ALL</button>
        </div>
        <div id="lineChart" class="chart"></div>
      </section>

      <section class="card">
        <h2>Diff Treemap</h2>
        <div id="treemapChart" class="chart"></div>
      </section>
    </main>

    <script>
      window.DATA_DIR = "../data";
    </script>
    <datalist id="availableDates"></datalist>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
